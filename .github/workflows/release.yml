name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.filter.outputs.should_build }}
      changed_files: ${{ steps.filter.outputs.changed_files }}
      previous_tag: ${{ steps.filter.outputs.previous_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect app-affecting changes since previous tag
        id: filter
        shell: bash
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)"

          echo "Current tag: ${CURRENT_TAG}"
          echo "Previous tag: ${PREVIOUS_TAG:-<none>}"

          if [ -z "${PREVIOUS_TAG}" ]; then
            echo "No previous tag found. Build will run."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "changed_files=Initial tagged release" >> "$GITHUB_OUTPUT"
            echo "previous_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only "${PREVIOUS_TAG}" "${CURRENT_TAG}")"
          echo "Changed files since previous tag:"
          echo "${CHANGED_FILES}"

          APP_CHANGED_FILES="$(echo "${CHANGED_FILES}" | grep -E '^(backend/|frontend/|\.github/workflows/release\.yml$)' || true)"

          if [ -n "${APP_CHANGED_FILES}" ]; then
            {
              echo "should_build=true"
              echo "previous_tag=${PREVIOUS_TAG}"
              echo 'changed_files<<EOF'
              echo "${APP_CHANGED_FILES}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "should_build=false"
              echo "previous_tag=${PREVIOUS_TAG}"
              echo 'changed_files<<EOF'
              echo "No app-affecting files changed."
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.should_build == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Print release decision
        shell: bash
        run: |
          echo "Previous tag: ${{ needs.detect-changes.outputs.previous_tag }}"
          echo "Changed app files:"
          printf '%s\n' "${{ needs.detect-changes.outputs.changed_files }}"

      # 1. Setup Python Environment
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # 2. Package Backend Sidecar
      - name: Build Sidecar
        shell: bash
        run: |
          cd backend
          python package_backend.py
        
      # 3. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Sync app version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd frontend
          node scripts/sync-version.mjs "$VERSION"

      # 4. Setup Rust for Tauri
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      # 5. Linux Dependencies (Only for Ubuntu)
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # 6. Build Tauri App
      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: "SQL Copilot Pro ${{ github.ref_name }}"
          releaseBody: "Automated Build & Release of SQL Copilot Pro AI."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.platform == 'windows-latest' && '--target x86_64-pc-windows-msvc' || '' }}
